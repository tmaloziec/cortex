name: security invariants

# R18 (GPT rc5 blocker #1): the README advertises "required CI
# checks for commercial deployments" but the repo had no CI. This
# workflow IS that CI. A PR that trips any of the five invariants
# fails merge; commercial licensees can copy this file verbatim or
# require it as a required status check in their fork.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Never run two invariant runs against the same commit concurrently;
# the later one will see the same tree anyway.
concurrency:
  group: invariants-${{ github.ref }}
  cancel-in-progress: true

jobs:
  invariants:
    name: structural invariants (AST + runtime sentinel)
    runs-on: ubuntu-latest
    # Pinned to 3.12 because tests/test_invariants.py walks the
    # Python AST and minor version bumps have changed Dict / match
    # node shapes in the past. Lock the interpreter until the test
    # abstracts over ast version differences.
    strategy:
      matrix:
        python-version: ["3.12"]
      fail-fast: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run structural invariant tests (STRICT)
        # The five invariants (role literals, route auth Depends,
        # client-IP derivation, fallback-via-policy, allow-comment
        # lifecycle). STRICT=True in the module — any offender
        # fails the run.
        run: python3 tests/test_invariants.py

      - name: Run policy regression tests
        # 52 regression tests covering every security fix from
        # rounds R1 through R17 (wrap_untrusted nonces, session
        # manager, rate-limit, plugin loader, path normalisation,
        # sentinel capability check, ...).
        run: python3 tests/test_policy.py

      - name: Verify UNSAFE.md is up to date
        # The lifecycle test regenerates UNSAFE.md; committing a
        # stale version should fail CI so reviewers always see the
        # current exemption surface.
        run: |
          git diff --exit-code UNSAFE.md || {
            echo "::error::UNSAFE.md is stale. Run tests locally and commit the regenerated file."
            exit 1
          }

  dependencies:
    name: dependency CVE scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install pip-audit
        run: pip install pip-audit
      - name: Audit requirements.txt
        # Any CVE disclosed against a pinned dependency fails the
        # run so requirements.txt is never quietly left vulnerable.
        run: pip-audit -r requirements.txt --strict
